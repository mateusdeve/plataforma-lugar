# Autowiring liga interface a implementação por tipo. As interfaces (portas)
# vivem em Application/ ou Domain/; as implementações, em Infrastructure/.
# É essa inversão que permite testar sem banco (fase 1 do PLAN.md).
services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Toda classe que implementa a porta de verificação recebe a tag, e o caso
    # de uso recebe todas de uma vez sem conhecer nenhuma. Acrescentar Redis ou
    # S3 ao health check vira uma classe nova em Infrastructure/ — e mais nada.
    #
    # A tag é declarada AQUI, e não com um atributo `#[AutoconfigureTag]` na
    # interface, porque o atributo é do Symfony e `Application/` não pode
    # importar Symfony (regra do deptrac.yaml). Configuração de framework mora
    # na configuração do framework.
    _instanceof:
        Lugar\Application\Saude\VerificadorDeDependencia:
            tags: ['lugar.verificador_de_saude']

    Lugar\:
        resource: '../src/'
        exclude:
            - '../src/Kernel.php'
            # Entidades e Value Objects não são serviços — são dados com
            # comportamento. Registrá-los no container seria erro de conceito.
            - '../src/Domain/'

    Lugar\UI\Http\Cors:
        arguments:
            $origemPermitida: '%env(CORS_ORIGEM_PERMITIDA)%'

    Lugar\Application\Usuario\AbrirSessao:
        arguments:
            $validadeDoRefreshEmDias: '%env(int:REFRESH_TTL_DIAS)%'

    Lugar\Application\Usuario\EmissorDeAccessToken: '@Lugar\Infrastructure\Seguranca\EmissorJwt'
    Lugar\Application\Usuario\UsuarioAtual: '@Lugar\Infrastructure\Seguranca\UsuarioAtualDoSymfony'
    Lugar\Domain\Usuario\RepositorioDeTokens: '@Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\RepositorioDoctrineDeTokens'

    Lugar\Application\Saude\ConsultarSaude:
        arguments:
            $verificadores: !tagged_iterator lugar.verificador_de_saude

    # ── portas → adaptadores ──────────────────────────────────────────────
    # As interfaces vivem em Domain/ e Application/; as implementações, em
    # Infrastructure/. É aqui que as duas pontas se encontram, e é o único
    # lugar do projeto que conhece as duas.
    Lugar\Domain\Comum\Relogio: '@Lugar\Infrastructure\Comum\RelogioDoSistema'
    Lugar\Domain\Comum\GeradorDeIdentidade: '@Lugar\Infrastructure\Comum\GeradorDeIdentidadePadrao'
    Lugar\Application\Comum\Transacao: '@Lugar\Infrastructure\Persistencia\Doctrine\TransacaoDoctrine'
    Lugar\Domain\Evento\RepositorioDeEventos: '@Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\RepositorioDoctrineDeEventos'
    Lugar\Domain\Lote\RepositorioDeLotes: '@Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\RepositorioDoctrineDeLotes'
    Lugar\Domain\Reserva\RepositorioDeReservas: '@Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\RepositorioDoctrineDeReservas'
    Lugar\Domain\Ingresso\RepositorioDeIngressos: '@Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\RepositorioDoctrineDeIngressos'
    Lugar\Domain\Usuario\RepositorioDeUsuarios: '@Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\RepositorioDoctrineDeUsuarios'
    Lugar\Domain\Usuario\HashDeSenha: '@Lugar\Infrastructure\Seguranca\HashDeSenhaSymfony'
    Lugar\Domain\Evento\EscalaDePortaria: '@Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\EscalaDePortariaDoctrine'

when@test:
    services:
        # Em produção nada disto é público: os serviços chegam por injeção.
        # O teste de concorrência precisa montar o cenário e por isso busca
        # estes três no container — só no ambiente de teste, e explicitamente.
        Lugar\Application\Reserva\CriarReserva:
            autowire: true
            public: true

        Lugar\Domain\Lote\RepositorioDeLotes:
            alias: Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\RepositorioDoctrineDeLotes
            public: true

        Lugar\Domain\Evento\RepositorioDeEventos:
            alias: Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\RepositorioDoctrineDeEventos
            public: true

        Lugar\Domain\Usuario\RepositorioDeUsuarios:
            alias: Lugar\Infrastructure\Persistencia\Doctrine\Repositorio\RepositorioDoctrineDeUsuarios
            public: true

        Lugar\Domain\Usuario\HashDeSenha:
            alias: Lugar\Infrastructure\Seguranca\HashDeSenhaSymfony
            public: true
