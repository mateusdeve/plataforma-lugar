lexik_jwt_authentication:
    secret_key: '%env(resolve:JWT_SECRET_KEY)%'
    public_key: '%env(resolve:JWT_PUBLIC_KEY)%'
    pass_phrase: '%env(JWT_PASSPHRASE)%'

    # 15 minutos. Curto de propósito: o access token não é revogável — uma vez
    # emitido, vale até expirar. A janela pequena limita o dano de um
    # vazamento. A sessão longa fica no refresh token, que é rotacionado a
    # cada uso e pode ser revogado no logout.
    token_ttl: '%env(int:JWT_TTL_SEGUNDOS)%'
