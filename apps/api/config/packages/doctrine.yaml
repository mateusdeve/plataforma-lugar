doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # Tipos que convertem os Value Objects do domínio em colunas. É o que
        # permite ao domínio ter LoteId e ReservaId como tipos distintos sem
        # saber que Doctrine existe.
        types:
            evento_id: Lugar\Infrastructure\Persistencia\Doctrine\Tipo\EventoIdType
            lote_id: Lugar\Infrastructure\Persistencia\Doctrine\Tipo\LoteIdType
            reserva_id: Lugar\Infrastructure\Persistencia\Doctrine\Tipo\ReservaIdType
            ingresso_id: Lugar\Infrastructure\Persistencia\Doctrine\Tipo\IngressoIdType
            usuario_id: Lugar\Infrastructure\Persistencia\Doctrine\Tipo\UsuarioIdType
            papeis: Lugar\Infrastructure\Persistencia\Doctrine\Tipo\PapeisType
            codigo_ingresso: Lugar\Infrastructure\Persistencia\Doctrine\Tipo\CodigoIngressoType

    orm:
        naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
        validate_xml_mapping: true
        mappings:
            # Mapeamento em XML, dentro de Infrastructure/, justamente para
            # manter as entidades de Domain/ livres de atributos do Doctrine.
            # Esta é a linha que faz a regra do Deptrac ser possível: se o
            # mapeamento fosse por atributos PHP, as entidades precisariam
            # importar `Doctrine\` e a fronteira cairia na primeira linha.
            Domain:
                type: xml
                dir: '%kernel.project_dir%/src/Infrastructure/Persistencia/Doctrine/Mapeamento'
                prefix: 'Lugar\Domain'
                is_bundle: false

when@test:
    doctrine:
        dbal:
            # Banco separado para teste, para que a suíte possa truncar tabelas
            # sem medo. O TEST_TOKEN permite rodar suítes em paralelo.
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'
