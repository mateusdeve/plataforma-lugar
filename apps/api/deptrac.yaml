# ─────────────────────────────────────────────────────────────────────────────
# Teste de arquitetura.
#
# O PRD (§7.2) chama isto de "regra inegociável": se `Domain/` importar
# `Doctrine\` ou `Symfony\`, a camada está errada. Uma regra que só existe no
# README é uma intenção; aqui ela é um teste que quebra o CI.
#
# O risco que isto combate está no PRD §13: "DDD virar pasta vazia com nome
# bonito". É fácil criar quatro diretórios e chamar de arquitetura hexagonal.
# É o Deptrac que transforma a pasta em fronteira.
#
#   Domain          não depende de NADA — nem do framework, nem das outras camadas
#   Application     depende só de Domain
#   Infrastructure  implementa as interfaces de Domain; pode usar o framework
#   UI              fala com Application; pode usar o framework
#
# Rodar: composer camadas
# ─────────────────────────────────────────────────────────────────────────────

deptrac:
  paths:
    - ./src

  layers:
    - name: Domain
      collectors:
        - type: directory
          value: src/Domain/.*

    - name: Application
      collectors:
        - type: directory
          value: src/Application/.*

    - name: Infrastructure
      collectors:
        - type: directory
          value: src/Infrastructure/.*

    - name: UI
      collectors:
        - type: directory
          value: src/UI/.*

    # Camadas de terceiros. Existem para poder proibi-las em Domain.
    - name: Symfony
      collectors:
        - type: classNameRegex
          value: '#^Symfony\\#'

    - name: Doctrine
      collectors:
        - type: classNameRegex
          value: '#^Doctrine\\#'

    # Todo o resto de terceiros: Lexik, PSR, e o que vier depois.
    #
    # Existe pelo mesmo motivo das duas camadas acima — para poder PROIBIR em
    # Domain. Sem ela, `--fail-on-uncovered` transforma cada dependência nova
    # de infraestrutura em build vermelho, o que empurraria a próxima pessoa a
    # desligar a flag. Uma regra que atrapalha demais acaba desligada, e aí não
    # protege mais nada.
    #
    # A garantia que importa continua intacta: Domain não pode depender desta
    # camada, então importar Lexik em src/Domain/ segue quebrando o build.
    - name: Terceiros
      collectors:
        - type: bool
          must:
            - type: classNameRegex
              value: '#^(Lexik|Psr|Symfony|Doctrine|Monolog|Composer)\\#'
          must_not:
            - type: classNameRegex
              value: '#^(Symfony|Doctrine)\\#'

  ruleset:
    # O ponto do arquivo inteiro: a lista de dependências permitidas do
    # domínio é vazia. Ele não conhece framework, ORM, nem as outras camadas.
    Domain: ~

    Application:
      - Domain

    Infrastructure:
      - Domain
      - Application
      - Symfony
      - Doctrine
      - Terceiros

    UI:
      - Application
      - Domain
      - Symfony
      - Terceiros
